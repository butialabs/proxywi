{{define "content"}}
<div class="flex items-center justify-between mb-4 flex-wrap gap-2">
  <h3 class="text-xl font-semibold">{{t "dashboard.title"}}</h3>
  <form class="flex items-center gap-2" method="get" action="/">
    <select name="period" class="bg-soft border border-border-hi px-2 py-1.5 text-fg focus:outline-none focus:ring-2 focus:ring-accent/40 w-auto">
      {{range .PeriodOptions}}<option value="{{.Value}}" {{if eq .Value $.FilterPeriod}}selected{{end}}>{{.Label}}</option>{{end}}
    </select>
    <button class="inline-flex items-center gap-1 bg-accent text-bg px-2.5 py-2 text-sm font-medium hover:bg-accent-hi" type="submit" title="apply"><i class="bi bi-arrow-clockwise"></i></button>
  </form>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
  <div><div class="bg-panel border border-border p-0 h-full"><div class="p-4">
    <div class="flex items-center">
      <div class="grow">
        <div class="text-dim text-xs uppercase">{{t "dashboard.online_clients"}}</div>
        <div class="text-2xl font-semibold text-accent tabular-nums">{{.OnlineCount}}<span class="text-dim text-base"> / {{.TotalClients}}</span></div>
      </div>
      <i class="bi bi-hdd-network text-4xl text-accent opacity-50"></i>
    </div>
  </div></div></div>
  <div><div class="bg-panel border border-border p-0 h-full"><div class="p-4">
    <div class="flex items-center">
      <div class="grow">
        <div class="text-dim text-xs uppercase">{{t "dashboard.bytes_in"}}</div>
        <div class="text-2xl font-semibold tabular-nums">{{.BytesInHuman}}</div>
      </div>
      <i class="bi bi-arrow-down-circle text-4xl text-info opacity-50"></i>
    </div>
  </div></div></div>
  <div><div class="bg-panel border border-border p-0 h-full"><div class="p-4">
    <div class="flex items-center">
      <div class="grow">
        <div class="text-dim text-xs uppercase">{{t "dashboard.bytes_out"}}</div>
        <div class="text-2xl font-semibold tabular-nums">{{.BytesOutHuman}}</div>
      </div>
      <i class="bi bi-arrow-up-circle text-4xl text-accent opacity-50"></i>
    </div>
  </div></div></div>
</div>

<div class="bg-panel border border-border mb-4">
  <div class="bg-soft border-b border-border px-4 py-2 flex items-center gap-2 font-medium">
    <strong>{{t "dashboard.traffic_chart"}}</strong>
    <span class="ml-2 inline-flex items-center gap-1 px-2 py-0.5 text-xs bg-white/5 text-dim">{{.PeriodHuman}}</span>
  </div>
  <div class="p-4"><canvas id="trafficChart" height="110"></canvas></div>
</div>

<script id="dashboard-data" type="application/json">{{json .DashboardData}}</script>
{{end}}
{{template "layout" .}}
