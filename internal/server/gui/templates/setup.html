{{define "content"}}
<div class="flex justify-center">
  <div class="w-full max-w-md">
    <div class="bg-panel border border-border mt-4">
      <div class="p-4">
        <p class="text-dim">{{t "setup.intro"}}</p>
        <form method="post" action="/setup">
          <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
          <div class="mb-3">
            <label class="block text-sm text-dim mb-1">{{t "setup.username"}}</label>
            <div class="flex">
              <span class="inline-flex items-center px-2 bg-soft border border-border-hi border-r-0 text-dim"><i class="bi bi-person"></i></span>
              <input type="text" class="bg-soft border border-border-hi border-l-0 flex-1 px-2 py-1.5 text-fg focus:outline-none focus:ring-2 focus:ring-accent/40" name="username" value="{{.FormUsername}}" autofocus required>
            </div>
          </div>
          <div class="mb-3">
            <label class="block text-sm text-dim mb-1">{{t "setup.email"}}</label>
            <div class="flex">
              <span class="inline-flex items-center px-2 bg-soft border border-border-hi border-r-0 text-dim"><i class="bi bi-envelope"></i></span>
              <input type="email" class="bg-soft border border-border-hi border-l-0 flex-1 px-2 py-1.5 text-fg focus:outline-none focus:ring-2 focus:ring-accent/40" name="email" value="{{.FormEmail}}" required>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="mb-3">
              <label class="block text-sm text-dim mb-1">{{t "setup.password"}}</label>
              <div class="flex">
                <span class="inline-flex items-center px-2 bg-soft border border-border-hi border-r-0 text-dim"><i class="bi bi-lock"></i></span>
                <input type="password" class="bg-soft border border-border-hi border-l-0 flex-1 px-2 py-1.5 text-fg focus:outline-none focus:ring-2 focus:ring-accent/40" name="password" minlength="8" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="block text-sm text-dim mb-1">{{t "setup.password_confirm"}}</label>
              <div class="flex">
                <span class="inline-flex items-center px-2 bg-soft border border-border-hi border-r-0 text-dim"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="bg-soft border border-border-hi border-l-0 flex-1 px-2 py-1.5 text-fg focus:outline-none focus:ring-2 focus:ring-accent/40" name="password_confirm" minlength="8" required>
              </div>
            </div>
          </div>
          <button class="inline-flex items-center gap-1 bg-accent text-bg px-3 py-1.5 text-sm font-medium hover:bg-accent-hi w-full" type="submit">{{t
            "setup.create"}}</button>
        </form>
      </div>
    </div>
  </div>
</div>
{{end}}
{{template "layout" .}}
