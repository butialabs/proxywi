name: Release

# v*-server  → publishes proxywi-server only
# v*-client  → publishes proxywi-client only
on:
  push:
    tags:
      - "v*-server"
      - "v*-client"
  workflow_dispatch:
    inputs:
      component:
        description: "Which image to build"
        required: true
        default: "both"
        type: choice
        options: [both, server, client]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }
      - run: go vet ./...
      - run: go test ./...

  decide:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      server_build: ${{ steps.out.outputs.server_build }}
      client_build: ${{ steps.out.outputs.client_build }}
    steps:
      - name: Resolve build flags
        id: out
        env:
          COMPONENT_INPUT: ${{ inputs.component }}
        run: |
          server=false; client=false
          EVENT_NAME="${{ github.event_name }}"
          REF_NAME="${{ github.ref_name }}"
          case "$EVENT_NAME" in
            workflow_dispatch)
              [[ "$COMPONENT_INPUT" == "both" || "$COMPONENT_INPUT" == "server" ]] && server=true
              [[ "$COMPONENT_INPUT" == "both" || "$COMPONENT_INPUT" == "client" ]] && client=true
              ;;
            push)
              [[ "$REF_NAME" == *"-server" ]] && server=true
              [[ "$REF_NAME" == *"-client" ]] && client=true
              ;;
          esac
          echo "server_build=$server" >> "$GITHUB_OUTPUT"
          echo "client_build=$client" >> "$GITHUB_OUTPUT"
          echo "server=$server client=$client"

  setup:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'tag'
    outputs:
      version: ${{ steps.vars.outputs.version }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "$VERSION" =~ -(alpha|beta|rc|pre|dev) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # SERVER
  server-build:
    needs: decide
    if: needs.decide.outputs.server_build == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/proxywi-server,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=server-${{ matrix.arch }}
          cache-to:   type=gha,mode=max,scope=server-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-server-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  server-merge:
    needs: server-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-server-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/proxywi-server
          tags: |
            type=match,pattern=v(.*)-server,group=1,enable=${{ github.ref_type == 'tag' }}
            type=match,pattern=v(.*)-server,group=1,prefix=v,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          mapfile -t tags < <(jq -cr '.tags[]' <<< "${DOCKER_METADATA_OUTPUT_JSON}")
          tag_args=()
          for t in "${tags[@]}"; do
            tag_args+=("--tag" "$t")
          done
          refs=()
          for f in *; do
            refs+=("${REGISTRY}/${IMAGE_OWNER}/proxywi-server@$(cat "$f")")
          done
          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/proxywi-server:${{ steps.meta.outputs.version }}

  # CLIENT
  client-build:
    needs: decide
    if: needs.decide.outputs.client_build == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/client/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/proxywi-client,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=client-${{ matrix.arch }}
          cache-to:   type=gha,mode=max,scope=client-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-client-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  client-merge:
    needs: client-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-client-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/proxywi-client
          tags: |
            type=match,pattern=v(.*)-client,group=1,enable=${{ github.ref_type == 'tag' }}
            type=match,pattern=v(.*)-client,group=1,prefix=v,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          mapfile -t tags < <(jq -cr '.tags[]' <<< "${DOCKER_METADATA_OUTPUT_JSON}")
          tag_args=()
          for t in "${tags[@]}"; do
            tag_args+=("--tag" "$t")
          done
          refs=()
          for f in *; do
            refs+=("${REGISTRY}/${IMAGE_OWNER}/proxywi-client@$(cat "$f")")
          done
          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/proxywi-client:${{ steps.meta.outputs.version }}

  publish-release:
    name: 📦 Publish release
    runs-on: ubuntu-24.04
    needs: [setup, server-merge, client-merge]
    if: always() && github.event_name == 'push' && github.ref_type == 'tag' && (needs.server-merge.result == 'success' || needs.client-merge.result == 'success')
    permissions:
      contents: write
      models: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Get commits since last tag
        id: commits
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            LOG=$(git log --pretty=format:"%s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"%s (%h)" "$PREVIOUS_TAG"..HEAD)
          fi
          {
            echo "LOG<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🤖 Generate release notes
        id: ai_notes
        run: |
          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg version "${{ needs.setup.outputs.version }}" \
              --arg log "${{ steps.commits.outputs.LOG }}" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {
                    role: "system",
                    content: "You are a technical writer for open source projects. Generate polished, friendly release notes in English from a list of git commits. Group changes into sections using these emojis: 🚀 New Features, 🐛 Bug Fixes, ⚡ Improvements, 💥 Breaking Changes. Omit sections with no entries. Be concise and developer-friendly. Do not include a title or version header."
                  },
                  {
                    role: "user",
                    content: ("Generate release notes for version " + $version + " from these commits:\n" + $log)
                  }
                ]
              }')"
          )
          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Release notes unavailable."')
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 📝 Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "🎉 ${{ needs.setup.outputs.version }}"
          tag_name: ${{ needs.setup.outputs.version }}
          body: ${{ steps.ai_notes.outputs.NOTES }}
          draft: false
          prerelease: ${{ needs.setup.outputs.prerelease }}
