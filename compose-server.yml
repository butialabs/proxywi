# proxywi.xyz        → :3000  (Admin GUI + WSS control plane)
# pomar.proxywi.xyz  → :7443  (HTTPS proxy, forward-proxy only)

services:
  proxywi-server:
    container_name: proxywi-server
    image: ghcr.io/butialabs/proxywi-server:latest
    restart: unless-stopped
    environment:
      PROXYWI_PROXY_ADDR:  ":7443"
      PROXYWI_MAIN_ADDR:     ":3000"
      PROXYWI_MAIN_DOMAIN:   "proxywi.xyz"
      PROXYWI_PROXY_DOMAIN: "pomar.proxywi.xyz"
      PROXYWI_DATA_DIR:     "/data"
      PROXYWI_TLS_MODE:     "on"
    volumes:
      - ./proxywi/data:/data
    ports:
      - "7443:7443"
      - "3000:3000"
