# proxywi.xyz        → 3000  (Admin GUI + WSS control plane)
# pomar.proxywi.xyz  → 8080  (HTTP forward proxy) + 1080 (SOCKS5 proxy)

services:
  proxywi-server:
    container_name: proxywi-server
    image: ghcr.io/butialabs/proxywi-server:latest
    restart: unless-stopped
    environment:
      PROXYWI_PROXY_HTTP_PORT:   8080
      PROXYWI_PROXY_SOCKET_PORT: 1080
      PROXYWI_MAIN_PORT:         3000
      PROXYWI_MAIN_DOMAIN:       "proxywi.xyz"
      PROXYWI_PROXY_DOMAIN:      "pomar.proxywi.xyz"
      PROXYWI_DATA_DIR:          "/data"
    volumes:
      - ./proxywi/data:/data
    ports:
      - "8080:8080"
      - "1080:1080"
      - "3000:3000"
